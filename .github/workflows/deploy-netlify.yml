# Deploys production on every push to `main`.
# Add repo secrets (GitHub → Settings → Secrets → Actions):
#   NETLIFY_AUTH_TOKEN — https://app.netlify.com/user/applications#personal-access-tokens
#   NETLIFY_SITE_ID    — 59a8c6d7-cb7c-4531-a856-6b183b13720a (IntermosCraft)
name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Build and deploy to production
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: netlify deploy --build --prod
